{% extends "base.html" %}
{% block title %}Регистрация — TaskBoard{% endblock %}
{% block content %}
<form class="auth-form" method="post" action="{{ url_for('register') }}">
  <h1 style="margin-bottom: 18px;">Регистрация</h1>
  {% if error %}
    <p class="auth-error">{{ error }}</p>
  {% endif %}
  <label for="email">Email</label>
  <input id="email" name="email" type="email" autocomplete="username" required>
  <label for="password">Пароль (мин. 3 символа)</label>
  <input id="password" name="password" type="password" autocomplete="new-password" required minlength="3">
  <button type="submit">Создать аккаунт</button>
  <p class="auth-switch">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</form>
{% endblock %}
