{% extends "base.html" %}
{% block title %}Sign up — TaskBoard{% endblock %}
{% block content %}
<form class="auth-form" method="post" action="{{ url_for('register') }}">
  <h1 style="margin-bottom: 18px;">Sign up</h1>
  {% if error %}
    <p class="auth-error">{{ error }}</p>
  {% endif %}
  <label for="email">Email</label>
  <input id="email" name="email" type="email" autocomplete="username" required>
  <label for="password">Password (min. 3 characters)</label>
  <input id="password" name="password" type="password" autocomplete="new-password" required minlength="3">
  <button type="submit">Create account</button>
  <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</form>
{% endblock %}
