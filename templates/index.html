  <div id="header"></div>
<!DOCTYPE html>
<html>
<head>
  <title>Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="board">
    <div class="col" id="todo">
      <h2>To Do</h2>
      <div class="cards"></div>
      <input placeholder="New task...">
      <button onclick="addTask('todo')">+</button>
    </div>
    <div class="col" id="doing">
      <h2>In Progress</h2>
      <div class="cards"></div>
    </div>
    <div class="col" id="done">
      <h2>Done</h2>
      <div class="cards"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
<div id="footer"></div>
<script src="components.js"></script>
<script src="app.js"></script>  <!-- только на главной -->
</body>
