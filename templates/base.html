<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}TaskBoard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-shell">
  <header class="site-header">
    <div class="inner">
      <a class="logo" href="{% if session.get('user_id') %}{{ url_for('main.board') }}{% else %}{{ url_for('main.index') }}{% endif %}">TaskBoard</a>
      <nav>
        <ul>
          <li><a href="{% if session.get('user_id') %}{{ url_for('main.board') }}{% else %}{{ url_for('main.index') }}{% endif %}">Home</a></li>
          <li><a href="{{ url_for('main.info') }}">About</a></li>
          <li><a href="{{ url_for('main.contact') }}">Contact</a></li>
          <li><a href="{{ url_for('main.docs_page') }}">API</a></li>
        </ul>
        <div class="nav-auth">
          {% if session.get('user_id') %}
            <a href="{{ url_for('auth.logout') }}">Log out</a>
          {% else %}
            <a class="nav-btn" href="{{ url_for('auth.login') }}">Log in</a>
            <a class="nav-btn" href="{{ url_for('auth.register') }}">Sign up</a>
          {% endif %}
        </div>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>TaskBoard © 2025 — pair project for learning</p>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
