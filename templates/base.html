<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}TaskBoard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-shell">
  <header class="site-header">
    <div class="inner">
      <a class="logo" href="{% if session.get('user_id') %}{{ url_for('board') }}{% else %}{{ url_for('index') }}{% endif %}">TaskBoard</a>
      <nav>
        <ul>
          <li><a href="{% if session.get('user_id') %}{{ url_for('board') }}{% else %}{{ url_for('index') }}{% endif %}">Главная</a></li>
          <li><a href="{{ url_for('info') }}">О проекте</a></li>
          <li><a href="{{ url_for('contact') }}">Контакты</a></li>
        </ul>
        <div class="nav-auth">
          {% if session.get('user_id') %}
            <a href="{{ url_for('logout') }}">Выйти</a>
          {% else %}
            <a class="nav-btn" href="{{ url_for('login') }}">Войти</a>
            <a class="nav-btn" href="{{ url_for('register') }}">Регистрация</a>
          {% endif %}
        </div>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>TaskBoard © 2025 — парный учебный проект</p>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
